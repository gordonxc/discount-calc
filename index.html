<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>折扣港幣計算機</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  h1 { font-size: 1.4rem; margin-bottom: 24px; text-align: center; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1.1rem;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: #4A90D9; }
  .result {
    margin-top: 24px;
    padding: 20px;
    background: #f0f7ff;
    border-radius: 12px;
    text-align: center;
  }
  .result-label { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
  .result-value { font-size: 2rem; font-weight: 700; color: #4A90D9; }
  .breakdown { font-size: 0.8rem; color: #999; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <h1>🔧 折扣港幣計算機</h1>
  <div class="field">
    <label>當地貨幣價錢</label>
    <input type="number" id="price" placeholder="e.g. 1000" step="0.01" oninput="calc()">
  </div>
  <div class="field">
    <label>匯率（1 當地貨幣 = ? 港幣）</label>
    <input type="number" id="rate" placeholder="e.g. 0.95" step="0.0001" oninput="calc()">
  </div>
  <div class="field">
    <label>折扣（%）</label>
    <input type="number" id="discount" placeholder="e.g. 20 = 8折" step="1" oninput="calc()">
  </div>
  <div class="result">
    <div class="result-label">折扣後港幣價錢</div>
    <div class="result-value" id="hkd">HK$ —</div>
    <div class="breakdown" id="detail"></div>
  </div>
</div>
<script>
function calc() {
  const price = parseFloat(document.getElementById('price').value);
  const rate = parseFloat(document.getElementById('rate').value);
  const discount = parseFloat(document.getElementById('discount').value);

  const elHkd = document.getElementById('hkd');
  const elDetail = document.getElementById('detail');

  if (isNaN(price) || isNaN(rate) || isNaN(discount)) {
    elHkd.textContent = 'HK$ —';
    elDetail.textContent = '';
    return;
  }

  const afterDiscount = price * (1 - discount / 100);
  const hkd = afterDiscount * rate;

  elHkd.textContent = 'HK$ ' + hkd.toFixed(2);
  elDetail.innerHTML =
    `${price.toFixed(2)} × (1 − ${discount}%)<br>` +
    `= ${afterDiscount.toFixed(2)} 當地貨幣<br>` +
    `× ${rate} = <strong>HK$ ${hkd.toFixed(2)}</strong>`;
}
</script>
</body>
</html>
